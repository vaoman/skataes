<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vaoman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            background-image: url('vaoman.webp');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;

            justify-content: center;

        }
        audio {

            cursor: pointer;
        }
    </style>
</head>

    <audio controls>

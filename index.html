<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vaoman</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('vaoman.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background-color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <audio id="audio">
        <source src="voaman.m4a" type="audio/m4a">
    </audio>
    <button id="playBtn">▶</button>
    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        
        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });
    </script>
</body>
</html>

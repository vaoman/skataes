<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vaoman</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('vaoman.webp');
            background-size: contain;
            background-position: center;
            background-attachment: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background-color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        button:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <audio id="audio" crossorigin="anonymous">
        <source src="vaoman.m4a" type="audio/m4a">
    </audio>
    <button id="playBtn">▶</button>
    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        
        playBtn.onclick = function(e) {
            e.preventDefault();
            console.log('Button clicked, audio paused:', audio.paused);
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.textContent = '⏸';
                    console.log('Playing');
                }).catch(err => {
                    console.error('Play error:', err);
                });
            } else {
                audio.pause();
                playBtn.textContent = '▶';
                console.log('Paused');
            }
        };
    </script>
</body>
</html>
